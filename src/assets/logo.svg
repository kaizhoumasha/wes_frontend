<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#00ff88" />
    </linearGradient>
    <linearGradient id="logoGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- 六边形边框 -->
  <path
    d="M100 10 L180 55 L180 145 L100 190 L20 145 L20 55 Z"
    fill="url(#logoGradientDark)"
    stroke="url(#logoGradient)"
    stroke-width="2"
  />

  <!-- 内部六边形 -->
  <path
    d="M100 30 L160 65 L160 135 L100 170 L40 135 L40 65 Z"
    fill="none"
    stroke="url(#logoGradient)"
    stroke-width="1"
    opacity="0.5"
  />

  <!-- 顶部 W 图标 -->
  <path
    d="M60 80 L70 80 L80 105 L90 80 L100 80 L110 105 L120 80 L130 80 L115 120 L105 120 L100 95 L95 120 L85 120 Z"
    fill="url(#logoGradient)"
  />

  <!-- 底部文字 -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#logoGradient)">
    P9 WES
  </text>

  <!-- 装饰点 -->
  <circle cx="100" cy="55" r="3" fill="url(#logoGradient)" />
  <circle cx="55" cy="75" r="2" fill="url(#logoGradient)" opacity="0.7" />
  <circle cx="145" cy="75" r="2" fill="url(#logoGradient)" opacity="0.7" />
</svg>
