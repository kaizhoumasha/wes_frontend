name: CI/CD Pipeline

# 部署策略说明：
# - develop 分支 → Cloudflare Pages（预发布环境）
# - main 分支   → 私有化部署（生产环境，不通过此 workflow）

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22.x'

jobs:
  check-workflow:
    name: 检查 Git 工作流规范
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: 检查禁止直接提交到 develop/main 分支
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "当前分支: $BRANCH"
          
          # 只检查 develop 和 main 分支
          if [[ "$BRANCH" != "develop" && "$BRANCH" != "main" ]]; then
            echo "✅ 非保护分支，跳过检查"
            exit 0
          fi
          
          # 检查最近的提交是否是 merge commit
          # 如果是 merge commit，则父提交数量应该 >= 2
          PARENT_COUNT=$(git rev-parse --verify HEAD^@ 2>/dev/null | wc -l | tr -d ' ')
          
          # 获取提交信息
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          echo "提交信息: $COMMIT_MSG"
          echo "父提交数量: $PARENT_COUNT"
          
          # 检查是否是 merge commit
          if [ "$PARENT_COUNT" -ge 2 ] || echo "$COMMIT_MSG" | grep -q "^Merge branch"; then
            echo "✅ 检测到 merge commit，允许合并"
            exit 0
          fi
          
          # 检查是否是 PR merge（GitHub PR merge 会创建 merge commit）
          if echo "$COMMIT_MSG" | grep -q "Merge pull request"; then
            echo "✅ 检测到 PR merge，允许合并"
            exit 0
          fi
          
          # 如果不是 merge commit，则是直接提交，拒绝
          echo "❌ 错误：禁止直接提交到 $BRANCH 分支！"
          echo ""
          echo "📋 请使用 Git Worktree 开发模式："
          echo "   1. 创建 worktree: ./scripts/git-worktree.sh add feature-your-feature"
          echo "   2. 在 worktree 中开发并提交"
          echo "   3. 推送到远程并创建 PR"
          echo "   4. 通过 PR 合并到 $BRANCH"
          echo ""
          echo "详细说明请参考 CLAUDE.md 中的 'Git 工作流规范' 章节"
          exit 1

  lint-and-test:
    name: 代码检查与测试
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 类型检查
        run: pnpm run type:check

      - name: ESLint 检查
        run: pnpm run lint:eslint

      - name: Prettier 检查
        run: pnpm run lint:prettier

  build:
    name: 构建项目
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建生产版本
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  cloudflare-pages:
    name: 部署到 Cloudflare Pages（预发布环境）
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: 安装 Wrangler
        run: npm install -g wrangler

      - name: 部署到 Cloudflare Pages
        run: |
          wrangler pages deploy dist \
            --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} \
            --branch=develop
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
